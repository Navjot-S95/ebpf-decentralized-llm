---
apiVersion: v1
kind: Service
metadata:
  name: inference-node-b
  namespace: ebpf-llm
  labels:
    app: inference-node
    stage: "1"
spec:
  selector:
    app: inference-node
    stage: "1"
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  clusterIP: None  # headless
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-node-b
  namespace: ebpf-llm
  labels:
    app: inference-node
    stage: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-node
      stage: "1"
  template:
    metadata:
      labels:
        app: inference-node
        stage: "1"
    spec:
      containers:
        - name: inference
          image: ebpf-llm/inference:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          env:
            - name: NODE_ID
              value: "node-b"
            - name: STAGE_ID
              value: "1"
            - name: TOTAL_STAGES
              value: "2"
            - name: NEXT_NODE_ADDR
              value: ""  # last stage — no next node
            - name: GRPC_PORT
              value: "50051"
            - name: MODEL_NAME
              value: "gpt2"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1500Mi"
              cpu: "1"
